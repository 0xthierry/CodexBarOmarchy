name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Check out release commit
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Bun
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: bun install --frozen-lockfile

      - name: Verify release build inputs
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          bun run lint
          bun run typecheck
          bun test

      - name: Build release bundle
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: bun run package:release -- "${{ steps.release.outputs.version }}"

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            "dist/release/omarchy-agent-bar-${{ steps.release.outputs.version }}-linux-x64.tar.gz" \
            "dist/release/omarchy-agent-bar-${{ steps.release.outputs.version }}-linux-x64.tar.gz.sha256" \
            --clobber
